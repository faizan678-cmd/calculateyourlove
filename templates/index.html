<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love Calculator 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #fff0f5;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .fheart {
      position: absolute; font-size: 22px; opacity: 0.15;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.15; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }
    .card {
      position: relative; z-index: 1;
      background: #fff; border-radius: 24px;
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
      margin: 1rem; box-shadow: 0 8px 40px #ff6b9d22;
      text-align: center; border: 1.5px solid #ffd6e7;
    }
    .emoji-top { font-size: 48px; margin-bottom: 0.5rem; }
    h1 { font-size: 22px; font-weight: 800; color: #e91e63; margin-bottom: 0.3rem; }
    .subtitle { font-size: 14px; color: #f48fb1; margin-bottom: 1.8rem; }
    .input-wrap { position: relative; margin-bottom: 1rem; }
    .input-wrap input {
      width: 100%; padding: 13px 20px;
      border: 1.5px solid #ffd6e7; border-radius: 50px;
      font-size: 15px; font-family: 'Nunito', sans-serif;
      color: #333; outline: none; text-align: center;
      background: #fff9fb; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus { border-color: #e91e63; box-shadow: 0 0 0 3px #e91e6315; }
    .input-wrap input::placeholder { color: #f8bbd0; }
    .calc-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #e91e63, #ff6b9d);
      border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800; color: #fff;
      cursor: pointer; letter-spacing: 0.5px;
      transition: transform 0.15s, opacity 0.2s; margin-top: 0.4rem;
    }
    .calc-btn:hover { opacity: 0.9; }
    .calc-btn:active { transform: scale(0.97); }
    .result-box {
      margin-top: 1.8rem; background: #fff0f5;
      border-radius: 16px; padding: 1.5rem 1rem;
      border: 1.5px solid #ffd6e7; animation: popIn 0.4s ease;
    }
    @keyframes popIn {
      0%   { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .result-emoji { font-size: 52px; margin-bottom: 0.5rem; }
    .percent-wrap {
      margin: 0.8rem auto; width: 80%; height: 14px;
      background: #ffd6e7; border-radius: 50px; overflow: hidden;
    }
    .percent-bar {
      height: 100%; border-radius: 50px;
      background: linear-gradient(90deg, #e91e63, #ff6b9d);
      transition: width 1.2s ease;
    }
    .percent-num { font-size: 36px; font-weight: 800; color: #e91e63; margin: 0.4rem 0 0.2rem; }
    .result-msg { font-size: 15px; font-weight: 700; color: #ad1457; line-height: 1.5; }
    .result-sub { font-size: 13px; color: #f48fb1; margin-top: 6px; }
    .reset-btn {
      margin-top: 1.2rem; background: none;
      border: 1.5px solid #ffd6e7; border-radius: 50px;
      padding: 8px 24px; font-family: 'Nunito', sans-serif;
      font-size: 13px; color: #e91e63; cursor: pointer; transition: background 0.2s;
    }
    .reset-btn:hover { background: #fff0f5; }
    .confetti-piece {
      position: fixed; width: 8px; height: 8px;
      border-radius: 2px; pointer-events: none; z-index: 999;
      animation: confettiFall 2s ease forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    /* hide form after result */
    .hide { display: none; }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card">
    <div class="emoji-top">💘</div>
    <h1>Love Calculator</h1>
    <p class="subtitle">Kya woh tumse pyar karti hai? Janlo! 💕</p>

    {% if result is None %}
    <!-- ✅ DJANGO FORM — POST + csrf_token -->
    <form method="POST" id="loveForm">
      {% csrf_token %}
      <div class="input-wrap">
        <input type="text" name="your_name" placeholder="Tumhara naam 👦" maxlength="30" required/>
      </div>
      <div class="input-wrap">
        <input type="text" name="her_name" placeholder="Uska naam 👧" maxlength="30" required/>
      </div>
      <button type="submit" class="calc-btn">💖 Calculate Love</button>
    </form>

    {% else %}
    <!-- ✅ RESULT — Django se aaya -->
    <p style="color:#ad1457; font-weight:700; margin-bottom:1rem;">
      {{ your_name }} ❤️ {{ her_name }}
    </p>

    <div class="result-box" id="resultBox">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="percent-wrap">
        <div class="percent-bar" id="percentBar" style="width: 0%"></div>
      </div>
      <div class="percent-num">{{ result }}% 💗</div>
      <div class="result-msg" id="resultMsg"></div>
      <div class="result-sub" id="resultSub"></div>
      <a href="/" style="text-decoration:none;">
        <button class="reset-btn">🔄 Phir try karo</button>
      </a>
    </div>

    <script>
      const pct = {{ result }};
      const results = [
        { min: 95, emoji: '🥰', msg: 'WOW! Woh tumse beshumaar pyar karti hai!', sub: 'Tum dono ek perfect match ho! 💍' },
        { min: 85, emoji: '😍', msg: 'Bahut zyada! Dil uska sirf tumhara hai!', sub: 'Aaj hi propose kar do! 💐' },
        { min: 75, emoji: '💕', msg: 'Haan! Woh tumse sachcha pyar karti hai!', sub: 'Rishta bahut pyara hai tumhara 🌸' },
        { min: 65, emoji: '🙈', msg: 'vo nhi krti pyar tumse bhai ,dusri dund!', sub: 'meri mann tu abhi ja aur 2 baaar muthi maar 💌' },
        { min: 80, emoji: '😊', msg: 'tu greeb hn lodu nhi pategi!', sub: '2 baar muthi aur neet crack kr  🌷' },
        { min: 0,  emoji: '💫', msg: 'bhai teri sakal kharab hn !', sub: 'tu padai pai dyan de kitanu 🌈' },
      ];
      const res = results.find(r => pct >= r.min);
      document.getElementById('resultEmoji').textContent = res.emoji;
      document.getElementById('resultMsg').textContent  = res.msg;
      document.getElementById('resultSub').textContent  = res.sub;
      setTimeout(() => {
        document.getElementById('percentBar').style.width = pct + '%';
      }, 100);
      if (pct >= 75) spawnConfetti();

      function spawnConfetti() {
        const colors = ['#e91e63','#ff6b9d','#ffd6e7','#ff4081','#f8bbd0','#c2185b'];
        for (let i = 0; i < 60; i++) {
          setTimeout(() => {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.background = colors[Math.floor(Math.random() * colors.length)];
            c.style.animationDuration = (1.5 + Math.random()) + 's';
            c.style.animationDelay = (Math.random() * 0.5) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 2500);
          }, i * 30);
        }
      }
    </script>
    {% endif %}
  </div>

  <script>
    const bg = document.getElementById('heartsBg');
    const emojis = ['💕','💗','💖','💓','🩷','💝','💞'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'fheart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDuration = (6 + Math.random() * 8) + 's';
      h.style.animationDelay = (Math.random() * 8) + 's';
      h.style.fontSize = (14 + Math.random() * 18) + 'px';
      bg.appendChild(h);
    }
  </script>
</body>
</html>
